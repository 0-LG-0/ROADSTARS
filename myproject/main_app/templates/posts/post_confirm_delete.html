{% extends 'base.html' %}
{% block head %}
{% load static %}
    <link rel="stylesheet" href="{% static 'css/form.css' %}" />
{% endblock %}
{% block content %}
<h1>Confirm Deletion?</h1>
<form method="post">
    {% csrf_token %}
    <div class="user_options">
        <a class="user_btns" href="{{ request.META.HTTP_REFERER }}">Back</a>
        <button class="user_btns" type="submit">Delete</button>
    </div>
</form>
{% endblock %}
