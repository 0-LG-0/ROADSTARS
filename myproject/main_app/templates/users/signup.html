{% extends 'base.html' %}
{% block head %}
<!-- {% load static %}  if youre using ind css for page 
css link here -->
{% endblock %}
{% block content %}
<div>
    <h1>Sign Up</h1>
    {% if error_message %}
    <p>{{ error_message }}</p>
    {% endif %}
    <form action="" method="post" autocomplete="off">
        {% csrf_token %}
        <table>
            {{ form.as_table }}
        </table>
        <button type="submit">Submit</button>
    </form>
</div>
{% endblock %}
