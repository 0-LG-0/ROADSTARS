{% extends 'base.html' %}
{% block head %}
{% load static %}
    <link rel="stylesheet" href="{% static 'css/form.css' %}" />
{% endblock %}
{% block content %}
<div class="form_display">
    <h1>Sign Up</h1>
    {% if error_message %}
        <p>{{ error_message }}</p>
    {% endif %}
    <form action="" method="post" autocomplete="off">
        {% csrf_token %}
        <table>
            {{ form.as_table }}
        </table>
        <div class="user_options">
            <a class="user_btns" href="{{ request.META.HTTP_REFERER }}">Back</a>
            <button class="user_btns" type="submit">Signup</button>
        </div>
    </form>
</div>
{% endblock %}
