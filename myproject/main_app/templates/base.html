{% load static%}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" type="image/png" href="{% static 'images/icon.png' %}">
        <link rel="stylesheet" href="{% static 'css/base.css' %}" />
        <title>RoadStars</title>
        {% block head %}
        {% endblock %}
    </head>
    <body>
        <header>
            <nav>
                <a href="{% url 'home' %}">Home</a>
                <a href="{% url 'post-index' %}">Posts</a>
                <a href="{% url 'event-index' %}">Events</a>
                {% if user.is_authenticated %}
                    <a href="{% url 'user-post-index' %}">My Posts</a>
                    <a href="{% url 'user-event-index' %}">My Events</a>
                    <form id="logout-form" method="post" action="{% url 'logout' %}">
                        {% csrf_token %}
                        <button type="submit">Logout</button>
                    </form>
                {% else %}
                    <a href="{% url 'user-login' %}">Login</a>
                    <a href="{% url 'signup' %}">Sign Up</a>
                {% endif %}
            </nav>
            <div id="title">
                <h1>RoadStars</h1>
                {% if user.is_authenticated %}
                    <a id="user_link" href="{% url 'user-profile' %}">
                        <h2>{{ user.username }}</h2>
                    </a>
                {% endif %}
            </div>
            <hr />
        </header>
        <main>
            {% block content %}
            {% endblock %}
        </main>
    </body>
</html>
